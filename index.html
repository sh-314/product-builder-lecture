<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer</title>
    <meta name="google" content="notranslate">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="controls-top">
        <button id="mini-toggle" title="Open Mini Window">🗗</button>
        <button id="theme-toggle" aria-label="Toggle Theme">🌓</button>
    </div>
    <div id="app">
        <div id="status">Work 1/4</div>
        <div id="timer-display">40:00</div>
        <div id="time-adjust">
            <button id="decrease-time" title="Decrease 1 min">-</button>
            <button id="increase-time" title="Increase 1 min">+</button>
        </div>
        <div id="buttons">
            <button id="start-button">Start</button>
            <button id="pause-button">Pause</button>
            <button id="reset-button">Reset</button>
            <button id="auto-toggle">Auto: ON</button>
        </div>
    </div>
    <audio id="alarm-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>
    <script src="main.js"></script>
</body>
</html>
