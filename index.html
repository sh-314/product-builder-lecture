<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer</title>
    <meta name="google" content="notranslate">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="controls-top">
        <button id="partnership-btn" title="Partnership Inquiry">🤝</button>
        <button id="mini-toggle" title="Open Mini Window">🗗</button>
        <button id="theme-toggle" aria-label="Toggle Theme">🌓</button>
    </div>
    <div id="app">
        <div id="status">Work 1/4</div>
        <div id="timer-display">40:00</div>
        <div id="time-adjust">
            <button id="decrease-time" title="Decrease 1 min">-</button>
            <button id="increase-time" title="Increase 1 min">+</button>
        </div>
        <div id="buttons">
            <button id="start-button">Start</button>
            <button id="pause-button">Pause</button>
            <button id="reset-button">Reset</button>
            <button id="auto-toggle">Auto: ON</button>
        </div>
        
        <section id="partnership">
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/mwvapzeg" method="POST">
                <div class="form-group">
                    <label for="name">이름/기업명</label>
                    <input type="text" id="name" name="name" required placeholder="이름 또는 기업명을 입력해주세요">
                </div>
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="_replyto" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" required placeholder="제휴 관련 문의 내용을 상세히 적어주세요"></textarea>
                </div>
                <button type="submit" class="submit-btn">문의 보내기</button>
            </form>
        </section>
    </div>
    <audio id="alarm-sound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>
    <script src="main.js"></script>
</body>
</html>
